name: Bug report
description: Something in lazyssm behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the fields
        below — complete reports get fixed faster. For questions or usage help,
        use Discussions instead. For security issues, see SECURITY.md.
  - type: input
    id: version
    attributes:
      label: lazyssm version
      description: Output of `lazyssm --version`.
      placeholder: "e.g. v0.1.0 (or commit hash from a source build)"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / architecture
      placeholder: "e.g. macOS 15.5 arm64, Ubuntu 24.04 amd64, Windows 11 amd64"
    validations:
      required: true
  - type: input
    id: region
    attributes:
      label: AWS region
      placeholder: "e.g. ap-southeast-3"
    validations:
      required: false
  - type: dropdown
    id: install
    attributes:
      label: How did you install lazyssm?
      options:
        - go install
        - Built from source (make build)
        - Downloaded release binary
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What you observed, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact steps, including the command/flags you ran.
      placeholder: |
        1. Run `lazyssm --profile ... --region ...`
        2. Press `/` and type ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Output of `lazyssm doctor` (redact account IDs if you prefer).
      render: text
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: text
    validations:
      required: false
