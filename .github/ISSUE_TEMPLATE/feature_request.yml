name: Feature request
description: Suggest an idea or enhancement for lazyssm
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Describe the problem first, then your proposed solution.
        For open-ended discussion, consider starting a Discussion instead.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that lazyssm makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like to happen. Sketch the UX/keybinding/flag if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried or thought about.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I've checked the README and existing issues, and this isn't already covered.
          required: true
        - label: This fits lazyssm's scope (an SSM Session Manager TUI), not a general AWS tool.
          required: true
